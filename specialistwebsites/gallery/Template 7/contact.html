<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Dr Felix Thornton</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bar" role="presentation"></div>
  <div class="wrap">
    <header class="head">
      <div>
        <h1>Contact</h1>
        <p class="meta">Dr Felix Thornton — demo</p>
      </div>
      <nav aria-label="Primary">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="contact.html" aria-current="page">Contact</a></li>
        </ul>
      </nav>
    </header>
    <div class="contact-lines">
      <div><span>Address</span>Unit 3, 50 Northbourne Avenue, Canberra ACT 2601</div>
      <div><span>Phone</span><a href="tel:+61260000000">02 6000 0000</a></div>
      <div><span>Email</span><a href="mailto:afterhours@placeholder-act.au">afterhours@placeholder-act.au</a></div>
    </div>
    <div style="margin-top:2rem;">
      <p style="color:var(--grey);font-size:0.9rem;">Demo enquiry form.</p>
      <form action="#" method="get" onsubmit="return false;">
        <label for="x">Name</label>
        <input id="x" type="text" name="x">
        <label for="y">Email</label>
        <input id="y" type="email" name="y">
        <label for="z">Message</label>
        <textarea id="z" name="z"></textarea>
        <button type="submit" class="btn">Send</button>
      </form>
    </div>
    <footer>
      <p>ACT Medicare billing rules apply.</p>
    </footer>
  </div>
</body>
</html>
