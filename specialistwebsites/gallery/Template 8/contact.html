<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Dr Grace O’Connell</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="waves">
    <div class="inner">
      <h1>Contact</h1>
      <p>Gold Coast specialist rooms</p>
      <nav aria-label="Primary">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="contact.html" aria-current="page">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main>
    <div class="inner contact-grid" style="padding-top:2rem;">
      <div class="mini">
        <h3>Address</h3>
        <p style="margin:0;">Suite 12, 1 Hospital Boulevard, Southport QLD 4215</p>
      </div>
      <div class="mini">
        <h3>Phone &amp; fax</h3>
        <p style="margin:0;"><a href="tel:+61750000000">07 5000 0000</a><br>Fax 07 5000 0001</p>
      </div>
      <div class="mini" style="grid-column:1/-1;">
        <h3>Email</h3>
        <p style="margin:0;"><a href="mailto:eyes@placeholder-qld.au">eyes@placeholder-qld.au</a></p>
      </div>
    </div>
    <section class="panel inner" style="margin-top:1.5rem;">
      <h2 style="margin-top:0;">Message (demo)</h2>
      <form action="#" method="get" onsubmit="return false;">
        <label for="n1">Name</label>
        <input id="n1" type="text" name="n1">
        <label for="e1">Email</label>
        <input id="e1" type="email" name="e1">
        <label for="m1">Details</label>
        <textarea id="m1" name="m1"></textarea>
        <button type="submit" class="cta" style="border:none;">Submit</button>
      </form>
    </section>
  </main>
  <footer>
    <p>Queensland Health ophthalmic emergency — attend ED if advised.</p>
  </footer>
</body>
</html>
